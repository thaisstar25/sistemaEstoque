<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css">
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/reset.css">
    </head>
    <body>
        <header>
            <h1> Sistema de estoque</h1>
            <nav>
                <ul>
                    <li> <a href="#" >Inicio</a></li>
                    <li> <a href="#" >Gereniamento</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <div>
                    <h2>Entrada</h2>
                    <p>100</p>
                </div>
                <div>
                    <h2>Saída</h2>
                    <p>80</p>
                </div>
                <div>
                    <h2>Total</h2>
                    <p>20</p>
                </div>
            </section>
            <section>
                <div>
                    <label>Data</label>
                    <input type="date" >
                </div>
                <div>
                    <label>Tipo</label>
                    <select>
                        <option>Selecione uma opção</option>
                        <option>Entrada</option>
                        <option>Saída</option>
                    </select>
                </div>
                <div>
                    <label>Pesquisar item</label>
                    <input type="text" placeholder="Digite o nome do produto" >
                </div>
                <div>
                    <button>Pesquisar</button>
                </div>
            </section>
            <section>
                <div>
                    <table>
                        <thead>
                            <tr>
                                <th>Código de barras</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor unitário</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>123456777</td>
                                <td>Mouse</td>
                                <td>Logitech</td>
                                <td>MX</td>
                                <td>10</td>
                                <td>R$80,00</td>
                                <td>R$800,00</td>
                            </tr>
                            <tr>
                                <td>123456789</td>
                                <td>Teclado</td>
                                <td>Razer</td>
                                <td>RX</td>
                                <td>10</td>
                                <td>R$90,00</td>
                                <td>R$900,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <section>
                <div>
                    <label>Página</label>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>
                <div>
                    <button>Voltar</button>
                    <button>Próximo</button>
                </div>
            </section>
        </main>
    </body>
</html>
